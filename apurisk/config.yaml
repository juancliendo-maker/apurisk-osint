# APURISK 1.0 - Configuración de Plataforma OSINT
# Riesgos Políticos en Perú

plataforma:
  nombre: "APURISK 1.0"
  version: "0.1.0-mvp"
  pais: "PE"
  zona_horaria: "America/Lima"

# =====================================================================
# FUENTES RSS DE MEDIOS
# Estrategia tras sweep de URLs (mayo 2026):
#   - Feeds directos que respondieron HTTP 200 → se mantienen tal cual
#   - Feeds que devolvieron 403/404 → reemplazados por Google News RSS
#     (https://news.google.com/rss/search?q=site:...) que es estable, no
#     bloquea IPs de datacenter, y entrega artículos recientes con timestamp.
#   - Fuentes irrecuperables (YouTube panorama/puntofinal con channel_id
#     legacy) → eliminadas para reducir ruido en logs.
# =====================================================================
medios_rss:
