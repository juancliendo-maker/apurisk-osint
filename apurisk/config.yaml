# Twitter / X — opinión pública en tiempo real
# Para activar modo live, exportar TWITTER_BEARER_TOKEN como variable de entorno.
# Las queries están afinadas para capturar tweets RECIENTES y trending sobre
# riesgo político en Perú. Cada query incluye filtros de actualidad (verified
# para reducir ruido, last 7 days implícito en search/recent).
twitter_queries:
  # Estabilidad institucional y vacancia
  - "(Perú OR Peru) (vacancia OR \"moción de vacancia\" OR \"interpelación\" OR \"cuestión de confianza\") -is:retweet lang:es"
  - "(Perú OR Peru) (\"Balcázar\" OR Congreso OR \"premier\" OR gabinete) -is:retweet lang:es"
  # Procesos electorales (clave en 2026)
  - "(Perú OR Peru) (JNE OR ONPE OR \"segunda vuelta\" OR balotaje OR \"actas observadas\" OR impugnación) -is:retweet lang:es"
  - "(Perú OR Peru) (Fujimori OR \"Roberto Sánchez\" OR \"López Aliaga\" OR candidato presidencial) -is:retweet lang:es"
  # Encuestas y opinión pública
  - "(Perú OR Peru) (Ipsos OR Datum OR IEP OR CPI OR encuesta OR aprobación) -is:retweet lang:es"
  # Conflictos sociales y bloqueos
  - "(Perú OR Peru) (paro OR bloqueo OR \"Las Bambas\" OR Apurímac OR \"corredor minero\" OR Panamericana) -is:retweet lang:es"
  # Corrupción y captura institucional
  - "(Perú OR Peru) (corrupción OR fiscalía OR \"Lava Jato\" OR \"Ministerio Público\" OR \"organización criminal\") -is:retweet lang:es"
  # Seguridad ciudadana y FFAA
  - "(Perú OR Peru) (sicariato OR extorsión OR \"crimen organizado\" OR VRAEM OR \"Tren de Aragua\") -is:retweet lang:es"
  - "(Perú OR Peru) (FFAA OR \"Comando Conjunto\" OR \"Fuerzas Armadas\" OR \"estado de emergencia\" OR Huancavelica) -is:retweet lang:es"
  # Economía y mercados
  - "(Perú OR Peru) (\"riesgo país\" OR BCR OR \"sol peruano\" OR \"tipo de cambio\" OR Velarde) -is:retweet lang:es"
  # Tensiones diplomáticas y fronterizas
  - "(Perú OR Peru) (Kast OR Sheinbaum OR \"frontera con Chile\" OR Tacna OR cancillería) -is:retweet lang:es"
  # Cuentas oficiales que conviene seguir
  - "from:ONPE_oficial OR from:JNE_Peru OR from:DefensoriaPeru OR from:MININTER OR from:MindefPeru OR from:PCMperu"
twitter_max_per_query: 20
# Solo capturar tweets de las últimas N horas (para hashtags trending recientes)
twitter_ventana_horas: 72

# Datasets internacionales
internacional:
  gdelt_query:
    nombre: "GDELT - Eventos Perú"
    url: "https://api.gdeltproject.org/api/v2/doc/doc?query=Peru%20politics&mode=ArtList&format=json&maxrecords=50"
  acled_peru:
    nombre: "ACLED - Conflictos Perú"
    url: "https://api.acleddata.com/acled/read?country=Peru"
    requiere_api_key: true

# Análisis - parámetros
analisis:
  ventana_dias: 7              # ventana de análisis
  top_n_entidades: 15
  top_n_temas: 10
  umbral_riesgo_alto: 70       # 0-100

# Clasificadores REAL-TIME para pestañas Legislativo y Conflictos.
# El sistema procesa los artículos RSS de medios ya recolectados y los
# clasifica como actividad legislativa o conflicto social en tiempo real.
congreso_ventana_dias: 7         # solo items legislativos de últimos N días
congreso_max_items: 30
conflictos_ventana_dias: 7       # solo conflictos sociales de últimos N días
conflictos_max_items: 40

# Indicadores de riesgo (categorías y pesos) — 12 categorías
indicadores_riesgo:
  estabilidad_gobierno: 0.16
  conflictos_sociales: 0.13
  violencia_electoral: 0.10        # NUEVO factor crítico
  riesgo_regulatorio: 0.08
  corrupcion: 0.10
  seguridad: 0.09
  intervencion_militar: 0.08
  tensiones_fronterizas: 0.07
  polarizacion: 0.06
  crisis_migratoria: 0.05
  tensiones_diplomaticas: 0.05
  presion_economica: 0.03

# Salida
salida:
  carpeta: "./output"
  generar_html: true
  generar_docx: true
  generar_json: true
