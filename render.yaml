services:
  - type: web
    name: apurisk-osint
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements-server.txt
    startCommand: uvicorn apurisk.server:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /healthz

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: REFRESH_SECONDS
        value: 1800
      - key: OUTPUT_DIR
        value: /opt/render/project/src/output
      - key: PYTHONUNBUFFERED
        value: 1
      - key: TWITTER_BEARER_TOKEN
        sync: false
